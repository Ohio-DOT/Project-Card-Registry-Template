name: Validate and Update Registry (PR)

on:
  pull_request:
    branches: [ main ]

jobs:
  validate_and_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml projectcard
          pip install -e git+https://github.com/network-wrangler/network_wrangler.git@main#egg=network_wrangler

      - name: Run Validation and Capture Output
        id: validation
        run: |
          # Capture script output to a file for the PR comment
          # If update_registry.py raises a ValueError, this step fails
          python update_registry.py > validation_report.txt 2>&1
        continue-on-error: true

      - name: Post PR Report
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation_report.txt', 'utf8');
            const success = "${{ steps.validation.outcome }}" === "success";
            const icon = success ? "✅" : "❌";
            
            // Extract the summary section for prominence
            const summaryMatch = report.match(/--- PROJECT REGISTRY SUMMARY ---[\s\S]*?--------------------------------/);
            
            let summary = "";
            if (summaryMatch) {
              summary = summaryMatch[0];
            } else if (!success) {
              summary = "⚠️ **FATAL ERROR DETECTED:** The system could not generate a project summary because the script failed early. This is usually caused by a **Circular Dependency**, a **YAML Formatting Error**, or a **Base Network ID Conflict**. Please expand the logs below to see the exact Python error.";
            } else {
              summary = "No summary generated.";
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🚦 Network Registry Impact Report\n${icon} **Validation:** ${success ? "Passed" : "Failed"}\n\n**Proposed Changes / Status:**\n\`\`\`text\n${summary}\n\`\`\`\n\n<details><summary>View Full Technical Logs</summary>\n\n\`\`\`text\n${report}\n\`\`\`\n</details>`
            });
            fs.unlinkSync('validation_report.txt');

      - name: Commit Updated Registry
        if: steps.validation.outcome == 'success'
        run: |
          git config --local user.email "github-actions[bot]"
          git config --local user.name "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Clean up the report file if it wasn't deleted by the script step
          rm -f validation_report.txt
          # Only commits if registry.csv or projects/ changed
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated registry sync for PR #${{ github.event.pull_request.number }}"
            git push
          fi

      - name: Final Check
        if: steps.validation.outcome != 'success'
        run: exit 1